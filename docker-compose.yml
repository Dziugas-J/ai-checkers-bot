services:
  backend:
    build:
      context: ./backend
    container_name: ai-checkers-bot-backend
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FRONTEND_URL: http://localhost:5173

  frontend:
    build:
      context: ./frontend
    container_name: ai-checkers-bot-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend